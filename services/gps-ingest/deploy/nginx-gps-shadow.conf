# Shadow mode (Phase 5) — nginx config
# Use this block during the 7-day validation window.
# Go serves the client response; Laravel still processes mirrored requests.

location = /api/gps/reports {
    mirror /mirror-laravel-gps;
    proxy_pass         http://127.0.0.1:8081;
    proxy_set_header   X-Real-IP $remote_addr;
    proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_read_timeout 5s;
}

location /mirror-laravel-gps {
    internal;
    proxy_pass http://127.0.0.1:80/api/gps/reports;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
}
