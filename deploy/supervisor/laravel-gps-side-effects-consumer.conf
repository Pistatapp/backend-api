[program:gps-side-effects-consumer]
process_name=%(program_name)s_%(process_num)02d
command=php /home/api/public_html/artisan gps:consume-side-effects --timeout=5
autostart=true
autorestart=true
stopasgroup=true
killasgroup=true
user=api
numprocs=2
redirect_stderr=true
stdout_logfile=/home/api/public_html/storage/logs/gps-side-effects-consumer.log
stopwaitsecs=30
