[program:gps-side-effects]
process_name=%(program_name)s_%(process_num)02d
command=php /home/api/public_html/artisan queue:work redis --queue=gps-side-effects --sleep=1 --tries=3 --timeout=90 --max-jobs=1000 --max-time=3600
autostart=true
autorestart=true
stopasgroup=true
killasgroup=true
user=api
numprocs=8
redirect_stderr=true
stdout_logfile=/home/api/public_html/storage/logs/gps-side-effects.log
stopwaitsecs=3600
